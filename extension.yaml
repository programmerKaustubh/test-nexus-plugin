name: testnexus-crashlytics-alerts
version: 2.0.0
specVersion: v1beta

displayName: Test Nexus App Health Watcher
description: >-
  Unified monitoring extension for Firebase apps. Receives crash alerts from
  Crashlytics, detects Remote Config changes, and monitors Performance metrics
  — all from a single install. Sends instant push notifications to the
  Test Nexus app on your phone.

license: Apache-2.0

author:
  authorName: TwoCan
  url: https://twocan.us

billingRequired: true

roles:
  - role: firebasecrashlytics.viewer
    reason: >-
      Required to receive Crashlytics alert events from your project.

resources:
  - name: onNewFatalIssue
    type: firebaseextensions.v1beta.v2function
    description: Handles new fatal crash issues
    properties:
      location: ${param:LOCATION}
      buildConfig:
        runtime: nodejs22
      serviceConfig:
        availableMemory: 256M
      eventTrigger:
        eventType: google.firebase.firebasealerts.alerts.v1.published
        triggerRegion: global
        eventFilters:
          - attribute: alerttype
            value: crashlytics.newFatalIssue

  - name: onNewNonfatalIssue
    type: firebaseextensions.v1beta.v2function
    description: Handles new non-fatal issues
    properties:
      location: ${param:LOCATION}
      buildConfig:
        runtime: nodejs22
      serviceConfig:
        availableMemory: 256M
      eventTrigger:
        eventType: google.firebase.firebasealerts.alerts.v1.published
        triggerRegion: global
        eventFilters:
          - attribute: alerttype
            value: crashlytics.newNonfatalIssue

  - name: onNewAnrIssue
    type: firebaseextensions.v1beta.v2function
    description: Handles new ANR issues
    properties:
      location: ${param:LOCATION}
      buildConfig:
        runtime: nodejs22
      serviceConfig:
        availableMemory: 256M
      eventTrigger:
        eventType: google.firebase.firebasealerts.alerts.v1.published
        triggerRegion: global
        eventFilters:
          - attribute: alerttype
            value: crashlytics.newAnrIssue

  - name: onRegression
    type: firebaseextensions.v1beta.v2function
    description: Handles regression alerts
    properties:
      location: ${param:LOCATION}
      buildConfig:
        runtime: nodejs22
      serviceConfig:
        availableMemory: 256M
      eventTrigger:
        eventType: google.firebase.firebasealerts.alerts.v1.published
        triggerRegion: global
        eventFilters:
          - attribute: alerttype
            value: crashlytics.regression

  - name: onVelocityAlert
    type: firebaseextensions.v1beta.v2function
    description: Handles velocity alerts (trending issues)
    properties:
      location: ${param:LOCATION}
      buildConfig:
        runtime: nodejs22
      serviceConfig:
        availableMemory: 256M
      eventTrigger:
        eventType: google.firebase.firebasealerts.alerts.v1.published
        triggerRegion: global
        eventFilters:
          - attribute: alerttype
            value: crashlytics.velocity

  - name: onStabilityDigest
    type: firebaseextensions.v1beta.v2function
    description: Handles stability digest reports
    properties:
      location: ${param:LOCATION}
      buildConfig:
        runtime: nodejs22
      serviceConfig:
        availableMemory: 256M
      eventTrigger:
        eventType: google.firebase.firebasealerts.alerts.v1.published
        triggerRegion: global
        eventFilters:
          - attribute: alerttype
            value: crashlytics.stabilityDigest

  # ── Remote Config Trigger ──
  - name: onConfigUpdated
    type: firebaseextensions.v1beta.v2function
    description: Triggers when Remote Config template is published, rolled back, or modified.
    properties:
      location: ${param:LOCATION}
      buildConfig:
        runtime: nodejs22
      serviceConfig:
        availableMemory: 256M
      eventTrigger:
        eventType: google.firebase.remoteconfig.remoteConfig.v1.updated
        triggerRegion: global

  # ── Performance Polling Trigger ──
  - name: checkPerformanceMetrics
    type: firebaseextensions.v1beta.function
    description: Polls Firebase Performance API on a schedule and alerts on threshold breaches.
    properties:
      location: ${param:LOCATION}
      runtime: nodejs22
      availableMemoryMb: 512
      timeout: 120s
      scheduleTrigger:
        schedule: every 5 minutes

params:
  - param: CONNECTION_TOKEN
    label: TestNexus Connection Token(s)
    description: >-
      One or more connection tokens from the TestNexus app (Connected Apps section).
      For a single token, enter it directly (e.g., tnx_abc123...).
      For multiple tokens, separate with commas (e.g., tnx_abc123...,tnx_xyz789...).
      Each token can have different alert types and recipients configured in the TestNexus app.
    type: secret
    required: true

  - param: APP_IDENTIFIER
    label: App Identifier
    description: >-
      A human-readable name for this app (e.g., "My Production App").
      This appears in alert notifications.
    type: string
    required: true
    validationRegex: "^.{1,100}$"
    validationErrorMessage: Must be between 1 and 100 characters.

  - param: LOCATION
    label: Cloud Functions location
    description: >-
      Where should the extension's functions be deployed?
    type: select
    required: true
    default: us-central1
    options:
      - label: Iowa (us-central1)
        value: us-central1
      - label: South Carolina (us-east1)
        value: us-east1
      - label: Oregon (us-west1)
        value: us-west1
      - label: Belgium (europe-west1)
        value: europe-west1
      - label: Tokyo (asia-northeast1)
        value: asia-northeast1

  # ── Remote Config Parameters ──
  - param: WATCHLIST_KEYS
    label: Remote Config Watchlist Keys
    description: >-
      Comma-separated list of Remote Config parameter keys to watch.
      Changes to these keys trigger a higher-priority alert. Leave empty to disable.
    type: string
    required: false

  - param: NOTIFY_ALL_CONFIG_CHANGES
    label: Notify on All Config Changes
    description: >-
      If "Yes", sends an alert for every Remote Config publish.
      If "No", only watchlist key changes trigger alerts.
    type: select
    options:
      - label: "Yes"
        value: "true"
      - label: "No"
        value: "false"
    default: "true"
    required: true

  - param: INCLUDE_VALUES
    label: Include Config Parameter Values
    description: >-
      If "Yes", old and new Remote Config values are included in alerts.
      WARNING: Only enable if your config values do not contain secrets.
    type: select
    options:
      - label: "Yes — values are safe to include"
        value: "true"
      - label: "No — only send key names"
        value: "false"
    default: "false"
    required: true

  # ── Performance Parameters ──
  - param: PERF_CHECK_INTERVAL
    label: Performance Lookback Window (minutes)
    description: >-
      How far back to query performance metrics each check cycle.
      The check runs every 5 minutes automatically. This controls
      the data window size. Use 5 for real-time alerting, or 15
      for smoother averages that reduce noise.
    type: select
    options:
      - label: 5 minutes (real-time)
        value: "5"
      - label: 10 minutes (smoothed)
        value: "10"
      - label: 15 minutes (stable)
        value: "15"
    default: "5"
    required: true

  - param: LATENCY_THRESHOLD_MS
    label: API Latency Threshold (ms)
    description: Alert when network request p95 latency exceeds this value.
    type: string
    default: "3000"
    required: true
    validationRegex: "^[0-9]+$"
    validationErrorMessage: Must be a positive integer.

  - param: SCREEN_RENDER_THRESHOLD_MS
    label: Screen Render Threshold (ms)
    description: Alert when screen render time exceeds this value.
    type: string
    default: "700"
    required: true
    validationRegex: "^[0-9]+$"
    validationErrorMessage: Must be a positive integer.

  - param: SUCCESS_RATE_THRESHOLD_PCT
    label: Network Success Rate Threshold (%)
    description: Alert when network success rate drops below this percentage.
    type: string
    default: "95"
    required: true
    validationRegex: "^[0-9]+$"
    validationErrorMessage: Must be a positive integer (0-100).

  - param: CUSTOM_TRACE_THRESHOLDS
    label: Custom Trace Thresholds (JSON)
    description: >-
      JSON object mapping trace names to duration thresholds in ms.
      Example: {"checkout_flow": 5000, "image_upload": 10000}
    type: string
    default: "{}"
    required: false

  - param: DEDUP_WINDOW_MINUTES
    label: Dedup Window (minutes)
    description: >-
      Minimum time between repeated alerts for the same performance metric.
      Prevents alert fatigue from persistent threshold violations.
    type: string
    default: "15"
    required: true
    validationRegex: "^[0-9]+$"
    validationErrorMessage: Must be a positive integer.

  # ── Shared ──
  # TODO: Change default to production URL before public release
  - param: TESTNEXUS_API_URL
    label: Test Nexus Backend URL
    description: >-
      The Test Nexus server endpoint. Change only if directed by support.
    type: string
    required: true
    default: https://us-central1-test-nexus-debug-52895.cloudfunctions.net
